<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TransitOps</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
  <a class="navbar-brand" href="{% url 'dashboard' %}">🚚 TransitOps</a>
  <div class="navbar-nav flex-row flex-wrap gap-2">
    <a class="nav-link text-white" href="{% url 'vehicle_list' %}">Vehicles</a>
    <a class="nav-link text-white" href="{% url 'driver_list' %}">Drivers</a>
    <a class="nav-link text-white" href="{% url 'trip_list' %}">Trips</a>
    <a class="nav-link text-white" href="{% url 'maintenance_list' %}">Maintenance</a>
    <a class="nav-link text-white" href="{% url 'fuel_log_list' %}">Fuel Logs</a>
    
    <a class="nav-link text-white" href="{% url 'reports' %}">Reports</a>
    {% if user.is_authenticated %}
    <a class="nav-link text-warning" href="{% url 'logout' %}">Logout ({{ user.username }})</a>
    {% endif %}
  </div>
</nav>
<div class="container mt-4">
  {% for message in messages %}
    <div class="alert alert-{{ message.tags }}">{{ message }}</div>
  {% endfor %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
