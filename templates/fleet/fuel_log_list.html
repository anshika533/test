{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between">
  <h3>Fuel Logs</h3>
  <a class="btn btn-primary" href="{% url 'fuel_log_create' %}">+ Add Fuel Log</a>
</div>
<table class="table table-bordered bg-white mt-3">
<thead><tr><th>Vehicle</th><th>Liters</th><th>Cost</th><th>Date</th></tr></thead>
<tbody>
{% for f in logs %}
<tr><td>{{ f.vehicle }}</td><td>{{ f.liters }}</td><td>{{ f.cost }}</td><td>{{ f.date }}</td></tr>
{% endfor %}
</tbody>
</table>
{% endblock %}
