{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<div class="d-flex justify-content-between mb-3">

<h3>Customers</h3>

<a href="{% url 'customer_create' %}" class="btn btn-primary">

+ Add Customer

</a>

</div>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>

<th>ID</th>
<th>Company</th>
<th>Contact Person</th>
<th>Phone</th>
<th>Email</th>
<th>GST</th>
<th>Action</th>

</tr>

</thead>

<tbody>

{% for c in customers %}

<tr>

<td>{{ c.id }}</td>
<td>{{ c.company_name }}</td>
<td>{{ c.contact_person }}</td>
<td>{{ c.phone }}</td>
<td>{{ c.email }}</td>
<td>{{ c.gst_number }}</td>

<td>

<a href="{% url 'customer_edit' c.id %}" class="btn btn-warning btn-sm">

Edit

</a>

<a href="{% url 'customer_delete' c.id %}"
class="btn btn-danger btn-sm"
onclick="return confirm('Delete Customer?')">

Delete

</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
